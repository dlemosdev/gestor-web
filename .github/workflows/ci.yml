name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  testes-e-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Rodar testes
        run: npm run test -- --watch=false

      - name: Build de producao
        run: npm run build -- --configuration production
