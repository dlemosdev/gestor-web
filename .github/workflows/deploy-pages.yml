name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Instalar dependencias
        run: npm ci

      - name: Rodar testes
        run: npm run test -- --watch=false

      - name: Build para GitHub Pages
        run: npm run build -- --configuration production --base-href /gestor-web/

      - name: Fallback para rotas SPA
        run: cp dist/gestor/browser/index.html dist/gestor/browser/404.html

      - name: Publicar artefato Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/gestor/browser

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
